.riddle{

}

button:hover{
    transform:scale(1.05);
}

#answer{
    display:none;
    margin-top:30px;

}

.image-box img{
    max-width:70%;

    transition:transform 0.3s ease;
}

    opacity:0;

    animation:fadeIn 0.4s forwards;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
