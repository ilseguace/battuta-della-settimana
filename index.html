<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1706259833528879"
     crossorigin="anonymous"></script>
<meta name="google-adsense-account" content="ca-pub-1706259833528879">

<title>Battuta della Settimana</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f4f4;
    margin:0;
    display:flex;
    justify-content:center;
}

.container{
    max-width:600px;
    background:white;
    margin-top:60px;
    padding:40px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
    margin-bottom:30px;
}

.riddle{
    font-size:26px;
    font-weight:bold;
}

button{
    margin-top:30px;
    padding:16px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#ffd54f;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

#answer{
    display:none;
    margin-top:30px;
    font-size:24px;
}

.image-box{
    margin-top:30px;
}

.image-box img{
    max-width:100%;
    border-radius:10px;
}

.share{
    margin-top:35px;
}

.share button{
    margin:5px;
    font-size:14px;
    padding:10px 15px;
}

.newsletter{
    margin-top:40px;
}

.newsletter p{
    margin-bottom:10px;
    font-size:16px;
    color:#444;
}

.substack-btn{
    display:inline-block;
    padding:12px 20px;
    background:#eee;
    color:#333;
    font-size:15px;
    border-radius:6px;
    text-decoration:none;
    border:1px solid #ddd;
}

.substack-btn:hover{
    background:#e0e0e0;
}

.footer{
    margin-top:40px;
    font-size:14px;
    color:#666;
}

.footer a{
    text-decoration:none;
    color:#666;
}

.footer a:hover{
    text-decoration:underline;
}

</style>

<script>

// 🔄 NUOVA FUNZIONE TOGGLE
function toggleAnswer(){
    const answer = document.getElementById("answer");
    const btn = document.getElementById("toggleBtn");

    if(answer.style.display === "none"){
        answer.style.display = "block";
        btn.textContent = "Nascondi battuta";
    } else {
        answer.style.display = "none";
        btn.textContent = "Scopri la battuta";
    }
}

function shareWhatsApp(){
    const text = "Guarda questa battuta 😂";
    const url = window.location.href;
    window.open(`https://wa.me/?text=${text} ${url}`);
}

function shareFacebook(){
    const url = window.location.href;
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`);
}

</script>

</head>

<body>

<div class="container">

<h1>😂 Battuta della settimana</h1>

<div class="riddle">
Vorrei fare una battuta sull'Islam...
</div>

<!-- 🔘 BOTTONE AGGIORNATO -->
<button id="toggleBtn" onclick="toggleAnswer()">
Scopri la battuta
</button>

<div id="answer">
... Ma-ometto
</div>

<div class="image-box">
<img src="maometto.jpg" alt="battuta">
</div>

<div class="share">

<p>Condividi la battuta</p>

<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="shareFacebook()">Facebook</button>

</div>

<!-- Newsletter -->
<div class="newsletter">
    <p><strong>📬 Vuoi ricevere una battuta a settimana via mail?</strong></p>
    
    <a class="substack-btn" 
       href="https://marcodelfavero1.substack.com/subscribe" 
       target="_blank">
       Iscriviti alla Newsletter
    </a>
</div>

<!-- Footer -->
<div class="footer">
    <a href="https://ilseguace.github.io/">Informazioni sul sito</a> |
    <a href="/privacy.html">Privacy</a> |
    <a href="/contatti.html">Contatti</a>
</div>

</div>

</body>
</html>
